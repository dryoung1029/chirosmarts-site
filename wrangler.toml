# Cloudflare configuration for ChiroSmarts (Astro SSR on Pages).
#
# The IDs below are placeholders. After running the provisioning steps in
# README.md ("Cloudflare setup"), paste the real values here. Do NOT put
# secrets (API keys) in this file — those go in `.dev.vars` locally and in
# `wrangler pages secret put ...` for the deployed environment.

name = "chirosmarts-site"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Public, non-secret vars. SITE_URL must always come from the environment
# (used for magic-link emails, Stripe redirects, certificate verification links).
# This is the PRODUCTION value; local `astro dev` overrides it via `.dev.vars`.
[vars]
SITE_URL = "https://chirosmarts-site.pages.dev"
# Comma-separated emails auto-promoted to site_admin on login (M5 admin access).
ADMIN_EMAILS = "contact@chirosmarts.com"
# Transactional "From" for ALL Resend mail (magic links, receipts, certs).
# REQUIRES chirosmarts.com to be a VERIFIED domain in Resend before deploying —
# sending from an unverified domain makes Resend reject every message.
EMAIL_FROM = "ChiroSmarts <noreply@chirosmarts.com>"
EMAIL_REPLY_TO = "contact@chirosmarts.com"

# --- D1 (database) ---
[[d1_databases]]
binding = "DB"
database_name = "chirosmarts"
database_id = "05f1cac3-0a6f-4b49-82f1-46d87f064445"
migrations_dir = "./migrations"

# --- Workers AI (M6 tutor: transcript + query embeddings for semantic search) ---
[ai]
binding = "AI"

# --- R2 (documents: certificate PDFs, signed hands-on logs) ---
[[r2_buckets]]
binding = "DOCS"
bucket_name = "chirosmarts-docs"

# --- KV (required by the Astro Cloudflare adapter) ---
# The adapter auto-enables `astro:session` backed by Workers KV and expects a
# binding named SESSION; without it the DEPLOYED worker errors ("Invalid binding
# SESSION"). We do NOT use astro:session — auth runs on the D1 `sessions` table —
# so this namespace exists only to satisfy the adapter and stays empty.
# Create it with:  wrangler kv namespace create SESSION
[[kv_namespaces]]
binding = "SESSION"
id = "f2e867ee7e5040b3a67d71120ca61e24"

# Cloudflare Stream is not a wrangler binding — it is accessed via the
# Cloudflare API using CF_ACCOUNT_ID + CF_STREAM_API_TOKEN (see .dev.vars).
